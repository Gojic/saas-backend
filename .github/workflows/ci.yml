name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm install

      - name: TypeScript Build Check
        # Ovo će "pasti" ako imaš crvene linije u kodu kao na slici image_3b6680.png
        run: npx tsc --noEmit

      - name: Run Lint
        run: npm run lint --if-present
