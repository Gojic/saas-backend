services:
  db:
    image: mysql:8.0
    container_name: saas_mysql
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASS:-rootpass}
      MYSQL_DATABASE: ${DB_NAME:-saas}
      MYSQL_USER: ${DB_USER:-saas_user}
      MYSQL_PASSWORD: ${DB_PASS:-saas_pass}
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mysqladmin ping -uroot -p$${MYSQL_ROOT_PASSWORD} --silent",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: saas_redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas_api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DIALECT: mysql
      NODE_ENV: production
      PORT: 8080
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:8080"
    command: sh -c "npx sequelize-cli db:migrate --env production && npm run start"
    profiles: ["prod"]

  app-dev:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas_api_dev
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DIALECT: mysql
      NODE_ENV: development
      PORT: 8080
      CHOKIDAR_USEPOLLING: "1"
      WATCHPACK_POLLING: "true"
      REDIS_URL: redis://redis:6379
    ports:
      - "8080:8080"
    command: sh -c "npx sequelize-cli db:migrate && npm run dev"
    volumes:
      - ./src:/app/src
      - ./tsconfig.json:/app/tsconfig.json
    profiles: ["dev"]

  app-built:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: saas_api_built
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DB_HOST: db
      DB_PORT: 3306
      DB_DIALECT: mysql
      NODE_ENV: production
      PORT: 8080
      NODE_OPTIONS: "--max-old-space-size=4096"
    ports:
      - "8080:8080"
    command: sh -c "npx sequelize-cli db:migrate --env production && npm run build && node dist/server.js"
    profiles: ["ingest"]

  app-test:
    build:
      context: .
      dockerfile: Dockerfile
      target: base
    container_name: saas_api_test
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file:
      - .env.test
    environment:
      - NODE_ENV=test
      - DB_HOST=db
      - DB_USER=root
      - DB_PASS=rootpass

    command: sh -c "npx sequelize-cli db:create --env test && npx sequelize-cli db:migrate --env test && npm run test"
    volumes:
      - ./src:/app/src
      - ./package.json:/app/package.json
      - ./tsconfig.json:/app/tsconfig.json
    profiles: ["test"]
volumes:
  db_data:
  redis_data:
